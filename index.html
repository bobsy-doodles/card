<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Card Manager</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 p-4 text-gray-800 antialiased">

    <!-- SIGN IN -->
    <div id="auth" class="max-w-md mx-auto my-20 bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4 text-center">Sign In</h2>
        <form onsubmit="event.preventDefault(); auth.remove(); app.classList.remove('hidden'); showCards();" class="space-y-3">
            <input type="email" placeholder="Email" required class="w-full p-2 border rounded">
            <input type="password" placeholder="Password" required class="w-full p-2 border rounded">
            <button class="w-full bg-blue-600 text-white p-2 rounded font-bold cursor-pointer">Log In</button>
        </form>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="max-w-xl mx-auto hidden space-y-6">
        <!-- ADD CARD -->
        <form id="cardForm" onsubmit="addCard(event)" class="bg-white p-4 rounded-xl shadow space-y-3">
            <h3 class="font-bold text-lg">Add Gift Card</h3>
            <input type="text" id="name" placeholder="Store Name" required class="w-full p-2 border rounded">
            <input type="text" id="num" placeholder="Card Number" required class="w-full p-2 border rounded">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="amt" step="0.01" placeholder="Amount ($)" required class="w-full p-2 border rounded">
                <input type="date" id="exp" required class="w-full p-2 border rounded">
            </div>
            <button class="w-full bg-green-600 text-white p-2 rounded font-bold cursor-pointer">Save Card</button>
        </form>

        <!-- RECEIPT SCANNER -->
        <div class="bg-white p-4 rounded-xl shadow space-y-3">
            <h3 class="font-bold text-lg">Scan Receipt</h3>
            <select id="selector" class="w-full p-2 border rounded bg-gray-50"></select>
            <label class="block text-center bg-blue-600 text-white p-3 rounded font-bold cursor-pointer">
                Take Photo & Deduct
                <input type="file" id="receiptFile" accept="image/*" capture="environment" onchange="scan(this)" class="hidden">
            </label>
            <div id="status" class="hidden text-center text-blue-600 font-bold animate-pulse">Reading receipt text... Please wait...</div>
        </div>

        <!-- LIST -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold text-lg mb-3">Your Cards (By Exp Date)</h3>
            <div id="list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('cards')) || [];

        function showCards() {
            cards.sort((a, b) => new Date(a.exp) - new Date(b.exp));
            localStorage.setItem('cards', JSON.stringify(cards));

            list.innerHTML = cards.map(c => `
                <div class="flex justify-between p-3 bg-gray-50 border rounded">
                    <div><b>${c.name}</b><p class="text-xs text-gray-500">...${c.num.slice(-4)}</p></div>
                    <div class="text-right"><b>$${c.amt.toFixed(2)}</b><p class="text-xs text-red-500">Exp: ${c.exp}</p></div>
                </div>
            `).join('') || '<p class="text-gray-400 italic text-center">No cards yet.</p>';

            selector.innerHTML = '<option value="">-- Choose Card --</option>' + 
                cards.map((c, i) => `<option value="${i}">${c.name} ($${c.amt.toFixed(2)})</option>`).join('');
        }

        function addCard(e) {
            e.preventDefault();
            cards.push({ name: name.value, num: num.value, amt: parseFloat(amt.value), exp: exp.value });
            cardForm.reset();
            showCards();
        }

        async function scan(input) {
            if (!input.files || input.files.length === 0) return;
            if (selector.value === "") {
                alert("Please pick a card from the dropdown menu first!");
                input.value = '';
                return;
            }

            status.classList.remove('hidden');
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = async function (e) {
                try {
                    // Extract text cleanly using the DataURL representation
                    const res = await Tesseract.recognize(e.target.result, 'eng');
                    const text = res.data.text;
                    
                    // Look through keywords for amounts
                    const moneyRegex = /(?:total|due|amount|balance|pay)[\s:;=$]*([\d,]+\.\d{2})/gi;
                    let match;
                    let parsedCost = 0;

                    while ((match = moneyRegex.exec(text)) !== null) {
                        let currentVal = parseFloat(match[1].replace(/,/g, ''));
                        if (currentVal > parsedCost) parsedCost = currentVal;
                    }

                    // Strict backup option looking for raw currency totals if keywords miss
                    if (parsedCost === 0) {
                        const genericRegex = /\$?([\d,]+\.\d{2})/g;
                        while ((match = genericRegex.exec(text)) !== null) {
                            let currentVal = parseFloat(match[1].replace(/,/g, ''));
                            if (currentVal > parsedCost && currentVal < 1000) parsedCost = currentVal;
                        }
                    }

                    status.classList.add('hidden');

                    // Prompt fallback if receipt print quality was too poor to read text 
                    if (parsedCost === 0) {
                        const manualVal = prompt("Could not auto-detect text. Enter receipt total manually:", "0.00");
                        parsedCost = parseFloat(manualVal) || 0;
                    }

                    if (parsedCost > 0) {
                        const targetCard = cards[selector.value];
                        if (confirm(`Deduct $${parsedCost.toFixed(2)} from "${targetCard.name}"?`)) {
                            targetCard.amt = Math.max(0, targetCard.amt - parsedCost);
                            showCards();
                            alert("Balance updated successfully!");
                        }
                    }
                } catch (err) {
                    status.classList.add('hidden');
                    alert("OCR Engine Error: Failed to parse photo layer.");
                }
                input.value = ''; // Flush input file stream
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
