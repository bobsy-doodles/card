<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Card & Receipt Manager</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- Tesseract.js for Receipt OCR -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800">

    <!-- SIGN IN SCREEN -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <h2 class="text-2xl font-bold text-center text-slate-900 mb-2">GiftCard Vault</h2>
            <p class="text-sm text-slate-500 text-center mb-6">Sign in to manage your balances</p>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 active:scale-[0.98] transition cursor-pointer">Sign In</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden by default) -->
    <div id="appSection" class="hidden min-h-screen p-4 md:p-8">
        <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- LEFT PANEL: ADD CARD FORM -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                <h3 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">💳 Add New Card</h3>
                <form id="cardForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Store / Merchant Name</label>
                        <input type="text" id="cardName" placeholder="Target, Starbucks..." required class="w-full p-2.5 border border-slate-300 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Gift Card Number</label>
                        <input type="text" id="cardNumber" placeholder="Enter card details" required class="w-full p-2.5 border border-slate-300 rounded-xl text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Starting Amount ($)</label>
                            <input type="number" id="cardAmount" step="0.01" min="0" placeholder="0.00" required class="w-full p-2.5 border border-slate-300 rounded-xl text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Expiration Date</label>
                            <input type="date" id="cardExp" required class="w-full p-2.5 border border-slate-300 rounded-xl text-sm">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white p-2.5 rounded-xl font-medium hover:bg-emerald-700 active:scale-[0.98] transition cursor-pointer">Save Gift Card</button>
                </form>
            </div>

            <!-- RIGHT PANEL: SCANNER & SORTED LIST -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- SCAN RECEIPT COMPONENT -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold text-slate-900 mb-1">📸 Scan Shopping Receipt</h3>
                    <p class="text-sm text-slate-500 mb-4">Select a card, take a photo, and the total will be auto-deducted.</p>
                    
                    <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                        <select id="cardSelector" class="flex-1 p-3 border border-slate-300 rounded-xl bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">-- Choose Gift Card First --</option>
                        </select>
                        <label class="bg-blue-600 text-white py-3 px-6 rounded-xl cursor-pointer hover:bg-blue-700 active:scale-[0.98] transition text-center text-sm font-semibold whitespace-nowrap shadow-sm shadow-blue-200">
                            Snap Photo / Upload
                            <input type="file" id="receiptInput" accept="image/*" capture="environment" class="hidden">
                        </label>
                    </div>
                    <!-- Loader -->
                    <div id="scanStatus" class="hidden items-center justify-center gap-2 text-sm text-blue-600 font-medium mt-4 bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0112-7.32V4a10 10 0 00-10 10h2z"></path></svg>
                        Reading receipt text and searching for final total...
                    </div>
                </div>

                <!-- CARDS VIEW (ORDERED BY EXPIRATION) -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-slate-900">Your Cards <span class="text-xs font-normal text-slate-500">(Sorted by expiring soonest)</span></h3>
                        <button id="clearAll" class="text-xs text-red-500 hover:underline font-medium cursor-pointer">Clear All</button>
                    </div>
                    <div id="cardsList" class="space-y-3">
                        <!-- Dynamic content injects here -->
                        <p class="text-sm text-slate-400 text-center py-6 italic">No gift cards added yet.</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- ROUTING SETUP ---
        const loginSection = document.getElementById('loginSection');
        const appSection = document.getElementById('appSection');
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loginSection.classList.add('hidden');
            appSection.classList.remove('hidden');
            renderCards();
        });

        // --- APP STATE & ENGINE ---
        let cards = JSON.parse(localStorage.getItem('userCards')) || [];
        const cardForm = document.getElementById('cardForm');
        const cardsList = document.getElementById('cardsList');
        const cardSelector = document.getElementById('cardSelector');
        const clearAllBtn = document.getElementById('clearAll');

        cardForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('cardName').value;
            const number = document.getElementById('cardNumber').value;
            const amount = parseFloat(document.getElementById('cardAmount').value);
            const exp = document.getElementById('cardExp').value;

            cards.push({ id: Date.now(), name, number, amount, exp });
            syncStorage();
            cardForm.reset();
            renderCards();
        });

        clearAllBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to clear all gift cards?")) {
                cards = [];
                syncStorage();
                renderCards();
            }
        });

        function syncStorage() {
            localStorage.setItem('userCards', JSON.stringify(cards));
        }

        function renderCards() {
            // Sort by Expiration Date Chronologically (Soonest expiration first)
            cards.sort((a, b) => new Date(a.exp) - new Date(b.exp));
            
            cardsList.innerHTML = '';
            cardSelector.innerHTML = '<option value="">-- Choose Gift Card First --</option>';

            if (cards.length === 0) {
                cardsList.innerHTML = '<p class="text-sm text-slate-400 text-center py-6 italic">No gift cards added yet.</p>';
                return;
            }

            cards.forEach((card) => {
                // UI Cards List Block
                const cardDiv = document.createElement('div');
                cardDiv.className = "flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-2xs";
                
                // Style highlight for expired/nearly expired cards
                const isExpired = new Date(card.exp) < new Date();
                const expBadgeClass = isExpired ? "bg-red-100 text-red-700" : "bg-amber-100 text-amber-800";

                cardDiv.innerHTML = `
                    <div>
                        <h4 class="font-bold text-slate-900">${card.name}</h4>
**** **** **** ${card.number.slice(-4)}$${card.amount.toFixed(2)}Exp: ${card.exp} ${isExpired ? '(Expired)' : ''}`;cardsList.appendChild(cardDiv);// Option select engineconst option = document.createElement('option');option.value = card.id;option.textContent = ${card.name} (Bal: $${card.amount.toFixed(2)});cardSelector.appendChild(option);});}// --- OCR LOGIC (RECEIPT SCANNER) ---const receiptInput = document.getElementById('receiptInput');const scanStatus = document.getElementById('scanStatus');receiptInput.addEventListener('change', async (e) => {const file = e.target.files[0];const selectedId = cardSelector.value;if (!file) return;if (!selectedId) {alert("Please select a target gift card from the dropdown menu first.");receiptInput.value = '';return;}// Find matching card referenceconst cardIndex = cards.findIndex(c => c.id == selectedId);if(cardIndex === -1) return;scanStatus.classList.replace('hidden', 'flex');try {// Initialize Tesseract text minerconst result = await Tesseract.recognize(file, 'eng');const text = result.data.text;// Advanced regex strategy targeted to identify typical total string variantsconst totalRegex = /(?:total|grand[\s]*total|amount[\s]due|balance|due)[\s:;=$]([\d,]+.\d{2})/gi;let match;let extractedAmount = 0;while ((match = totalRegex.exec(text)) !== null) {let parsingValue = parseFloat(match[1].replace(',', ''));if (parsingValue > extractedAmount) {extractedAmount = parsingValue; // Prioritize highest structural match}}// Backup generic currency format fallback scannerif (extractedAmount === 0) {const fallbackRegex = /$?([\d,]+.\d{2})/g;while ((match = fallbackRegex.exec(text)) !== null) {let parsingValue = parseFloat(match[1].replace(',', ''));if (parsingValue > extractedAmount && parsingValue < 500) {extractedAmount = parsingValue;}}}scanStatus.classList.replace('flex', 'hidden');if (extractedAmount > 0) {const checkConfirm = confirm(Detected Receipt Total: $${extractedAmount.toFixed(2)}\n\nDeduct this from your "${cards[cardIndex].name}" balance?);if (checkConfirm) {cards[cardIndex].amount -= extractedAmount;if (cards[cardIndex].amount < 0) cards[cardIndex].amount = 0; // Balance safety limitsyncStorage();renderCards();alert("Balance updated successfully!");}} else {// Alert layout with manual fallback override structure if receipt reading was unclearconst manualVal = prompt("Could not auto-detect the clear receipt text total. Please type the amount to deduct manually:", "0.00");const parsedManual = parseFloat(manualVal);if(!isNaN(parsedManual) && parsedManual > 0) {cards[cardIndex].amount -= parsedManual;if (cards[cardIndex].amount < 0) cards[cardIndex].amount = 0;syncStorage();renderCards();}}} catch (err) {scanStatus.classList.replace('flex', 'hidden');alert("OCR processing layer failure: " + err.message);}receiptInput.value = ''; // Flush input file stream});
